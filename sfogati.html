<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sfogati</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:    #E24B4A;
    --red-shadow: #A32D2D;
    --orange: #D85A30;
    --orange-shadow: #993C1D;
    --amber:  #BA7517;
    --amber-shadow: #854F0B;
    --green:  #3B6D11;
    --green-shadow: #27500A;
    --bg: #FDF8F3;
    --text: #2C2C2A;
    --text-muted: #888780;
    --transition: 0.4s cubic-bezier(.4,0,.2,1);
  }

  html, body {
    height: 100%;
    width: 100%;
    font-family: 'Archivo', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    transition: background var(--transition);
  }

  #scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    padding: 2rem;
    position: relative;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  #message {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(18px, 4vw, 26px);
    color: var(--text);
    min-height: 2.2em;
    line-height: 1.3;
    transition: opacity 0.15s;
    letter-spacing: -0.01em;
  }

  #btn-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #btn {
    width: clamp(160px, 30vw, 200px);
    height: clamp(160px, 30vw, 200px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: clamp(48px, 10vw, 68px);
    background: var(--red);
    box-shadow: 0 10px 0 var(--red-shadow);
    transition: transform 0.08s, box-shadow 0.08s, background 0.5s, box-shadow-color 0.5s;
    position: relative;
    top: 0;
    outline: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  #btn:active, #btn.pressed {
    transform: translateY(8px);
    box-shadow: 0 2px 0 var(--red-shadow);
  }

  #btn:focus-visible {
    outline: 3px solid var(--text);
    outline-offset: 6px;
  }

  #ring {
    position: absolute;
    width: calc(clamp(160px, 30vw, 200px) + 24px);
    height: calc(clamp(160px, 30vw, 200px) + 24px);
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.4s, transform 0.6s;
    pointer-events: none;
  }

  #ring.active {
    border-color: var(--red);
    transform: scale(1.12);
    opacity: 0;
    animation: pulse-ring 0.5s ease-out forwards;
  }

  @keyframes pulse-ring {
    0%   { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  #counter-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #counter {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(42px, 10vw, 72px);
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.03em;
    transition: transform 0.1s;
  }

  #counter.pop {
    animation: pop 0.2s cubic-bezier(.36,.07,.19,.97);
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  #counter-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }

  #progress-wrap {
    width: 200px;
    height: 4px;
    background: rgba(0,0,0,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--red);
    border-radius: 99px;
    transition: width 0.3s ease, background 0.5s;
  }

  #progress-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: fly 0.8s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  @keyframes fly {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2) rotate(var(--rot)); }
  }
</style>
</head>
<body>

<div id="scene">
  <div id="message">Clicca per sfogarti</div>

  <div id="btn-wrap">
    <div id="ring"></div>
    <button id="btn" aria-label="Sfogati cliccando qui">💥</button>
  </div>

  <div id="counter-section">
    <div id="counter">0</div>
    <div id="counter-label">clic di sfogo</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="progress-label">livello tensione</div>
  </div>
</div>

<script>
const btn = document.getElementById('btn');
const msg = document.getElementById('message');
const counter = document.getElementById('counter');
const ring = document.getElementById('ring');
const progressBar = document.getElementById('progress-bar');
const body = document.body;

let count = 0;
const MAX_PROGRESS = 60;

const stages = [
  {
    threshold: 0,
    btnBg: '#E24B4A', btnShadow: '#A32D2D',
    bg: '#FDF8F3', barColor: '#E24B4A',
    messages: [
      ['Dai, ancora!','💢'],['Sì, proprio così!','😤'],
      ['Buttalo tutto fuori!','🔥'],['Non trattenerti!','💣'],
      ['Ancora, ancora!','😠'],['Bene così!','👊'],
    ]
  },
  {
    threshold: 15,
    btnBg: '#D85A30', btnShadow: '#993C1D',
    bg: '#FEF5F0', barColor: '#D85A30',
    messages: [
      ['Sfogati quanto vuoi!','🌋'],['Sei una forza!','⚡'],
      ['Continua pure…','🫨'],['Non ti fermare!','💥'],
      ['Tutto fuori!','🤬'],['Ancora un po\'…','😵'],
    ]
  },
  {
    threshold: 35,
    btnBg: '#BA7517', btnShadow: '#854F0B',
    bg: '#FEFAF0', barColor: '#BA7517',
    messages: [
      ['Quasi fatto…','😮‍💨'],['Senti come si allenta?','🌤️'],
      ['Stai andando benissimo!','💪'],['Tira fuori tutto!','🌊'],
      ['Ancora un po\' e ci sei!','😌'],
    ]
  },
  {
    threshold: 55,
    btnBg: '#3B6D11', btnShadow: '#27500A',
    bg: '#F4FAF0', barColor: '#3B6D11',
    messages: [
      ['Respira… eccolo 🌿','😌'],['Sento che stai meglio 🍃','😮‍💨'],
      ['Tutto ok adesso?','💚'],['Sei a posto 🌱','😊'],
    ]
  },
];

function getStage() {
  let s = stages[0];
  for (const st of stages) { if (count >= st.threshold) s = st; }
  return s;
}

function applyStage(s) {
  btn.style.background = s.btnBg;
  btn.style.boxShadow = `0 10px 0 ${s.btnShadow}`;
  btn.style.setProperty('--red-shadow', s.btnShadow);
  body.style.background = s.bg;
  progressBar.style.background = s.barColor;
  ring.style.borderColor = s.btnBg;
}

function updateProgress() {
  const pct = Math.min(100, (count / MAX_PROGRESS) * 100);
  progressBar.style.width = pct + '%';
}

function spawnParticles(x, y) {
  const colors = ['#E24B4A','#D85A30','#BA7517','#3B6D11','#D4537E','#533AB7'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 5 + Math.random() * 10;
    const angle = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 100;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      left:${x - size/2}px;top:${y - size/2}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      --rot:${Math.random()*360}deg;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

btn.addEventListener('click', function(e) {
  count++;

  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 130);

  ring.classList.remove('active');
  void ring.offsetWidth;
  ring.classList.add('active');

  const rect = btn.getBoundingClientRect();
  spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2);

  const s = getStage();
  applyStage(s);
  updateProgress();

  const [text, emoji] = s.messages[Math.floor(Math.random() * s.messages.length)];
  msg.textContent = text;
  btn.textContent = emoji;

  counter.textContent = count;
  counter.classList.remove('pop');
  void counter.offsetWidth;
  counter.classList.add('pop');
});

applyStage(stages[0]);
</script>
</body>
</html>
